# kubernetes_v2fmdash_multiple_replicas.yaml
# Separate frontend and backend deployments with 3 replicas each

# --- Backend Deployment ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: v2fmdash-backend
  namespace: default
  labels:
    app: v2fmdash-backend
    component: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: v2fmdash-backend
      component: backend
  template:
    metadata:
      labels:
        app: v2fmdash-backend
        component: backend
    spec:
      containers:
        - name: v2fmdash-backend-container
          image: git.liamhardman.com/liam/v2fmdash-backend:main
          imagePullPolicy: Always
          ports:
            - name: http-api
              containerPort: 8091
          env:
            - name: PORT_GO_API
              value: "8091"
            - name: ENABLE_METRICS
              value: "true"
            - name: OTEL_ENABLED
              value: "true"
            - name: INSECURE_MODE
              value: "true"
            - name: SERVICE_NAME
              value: "v2fmdash-api"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "signoz-otel-collector.signoz-helm:4317"
            - name: MAX_UPLOAD_SIZE
              value: "50"
            - name: OTEL_TRACE_SAMPLE_RATE
              value: "0.05"
            - name: SERVICE_VERSION
              value: "v0.1.0"
            - name: ENVIRONMENT
              value: "production"
            - name: SERVICE_NAMESPACE
              value: "fmdash"
            - name: GIT_REPOSITORY_URL
              value: "git.liamhardman.com/liam/v2fmdash"
            - name: GIT_COMMIT_SHA
              value: "main"
            - name: GIT_BRANCH
              value: "main"
            - name: BUILD_ID
              value: ""
            - name: BUILD_TIMESTAMP
              value: ""
            - name: DEPLOYMENT_ENV
              value: "kubernetes"
            
            # Image Storage Configuration
            - name: IMAGE_API_URL
              value: "https://sortitoutsi.b-cdn.net/uploads"
            
            # S3-Compatible Storage Configuration
            - name: S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: v2fmdash-minio-secret
                  key: endpoint
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: v2fmdash-minio-secret
                  key: access-key
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: v2fmdash-minio-secret
                  key: secret-key
            - name: S3_USE_SSL
              valueFrom:
                secretKeyRef:
                  name: v2fmdash-minio-secret
                  key: use-ssl
            - name: DATASET_RETENTION_DAYS
              value: "30"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /api/config
              port: http-api
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/config
              port: http-api
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

---
# --- Frontend Deployment ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: v2fmdash-frontend
  namespace: default
  labels:
    app: v2fmdash-frontend
    component: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: v2fmdash-frontend
      component: frontend
  template:
    metadata:
      labels:
        app: v2fmdash-frontend
        component: frontend
    spec:
      containers:
        - name: v2fmdash-frontend-container
          image: git.liamhardman.com/liam/v2fmdash-frontend:main
          imagePullPolicy: Always
          ports:
            - name: http-nginx
              containerPort: 8080
          env:
            # Runtime Configuration (injected at container startup)
            # Use "" for relative paths (default). Set to a full URL for an external backend.
            - name: API_ENDPOINT
              value: ""
            # Analytics Configuration
            - name: VITE_GA_TRACKING_ID
              value: "G-QYG3QS5C5Y"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: http-nginx
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http-nginx
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

---
# --- Backend Service ---
apiVersion: v1
kind: Service
metadata:
  name: v2fmdash-backend
  namespace: default
  labels:
    app: v2fmdash-backend
    component: backend
spec:
  type: ClusterIP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600
  selector:
    app: v2fmdash-backend
    component: backend
  ports:
    - name: http-api
      protocol: TCP
      port: 8091
      targetPort: http-api

---
# --- Frontend Service ---
apiVersion: v1
kind: Service
metadata:
  name: v2fmdash-frontend
  namespace: default
  labels:
    app: v2fmdash-frontend
    component: frontend
spec:
  type: ClusterIP
  selector:
    app: v2fmdash-frontend
    component: frontend
  ports:
    - name: http-frontend
      protocol: TCP
      port: 80
      targetPort: http-nginx

