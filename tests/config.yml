log_level: "WARNING"
upload_max: 50 # Upload limit in megabytes
results_to_return: 500 # How many results get returned back to you in the UI.
rows_per_chunk: 2500 #Recommended to keep this the same unless you have less than 4 CPU threads.
enable_tracing: true # Enables OTel Support. Off by default. Only turn on in a hosted environment and you know what you're doing.
trace_endpoint: "https://otlp.eu01.nr-data.net:4317"
#Web URL Used for fetching images for players not found via SoFIFA API (regens, obscure playaers etc.).
#Will always prefer the local dir fifa_card_assets/player_img/regen over the fallback_image_url
fallback_image_url: "https://api.fm-dash.com/player_img/regen/"

# Add any extra headers from your data export here if you want them to be graphed
